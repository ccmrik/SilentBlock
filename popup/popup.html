<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=280">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <svg class="shield" viewBox="0 0 24 24" width="22" height="22">
        <path fill="currentColor" d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 2.18l7 3.12v4.7c0 4.67-3.13 9.04-7 10.2-3.87-1.16-7-5.53-7-10.2V6.3l7-3.12z"/>
      </svg>
      <span class="title">SilentBlock</span>
    </div>

    <div class="row">
      <span class="label">Protection</span>
      <label class="switch">
        <input type="checkbox" id="globalToggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <hr class="divider">

    <div class="site-info" id="siteSection">
      <div class="site-name" id="siteName">&mdash;</div>
      <div class="row">
        <span class="label">Block on this site</span>
        <label class="switch">
          <input type="checkbox" id="siteToggle" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
